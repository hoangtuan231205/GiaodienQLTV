<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách chi tiết - LMS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/admin-style.css">
    <link rel="stylesheet" href="../../../../assets/css/admin/inventory-style.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="flex-grow-1">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4" id="main-content">
                
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h3 class="fw-bold mb-1">Quản lý kho sách chi tiết</h3>
                        <p class="text-muted mb-0">Theo dõi và cập nhật tình trạng kho sách thư viện</p>
                    </div>
                    <button type="button" id="btnAddNewBook" class="btn btn-primary shadow-sm fw-medium px-4">
                        <i class="fas fa-plus me-2"></i>Thêm sách mới
                    </button>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    
                    <div class="p-4 border-bottom">
                        <div class="row g-3">
                            <div class="col-md-5">
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" id="searchInput" class="form-control bg-light border-0" placeholder="Tìm kiếm theo mã sách, tên sách...">
                                </div>
                            </div>
                            <div class="col-md-7 d-flex gap-2">
                                <select id="filterCategory" class="form-select bg-light border-0">
                                    <option value="">Thể loại</option> </select>
                                
                                <select id="filterPublisher" class="form-select bg-light border-0">
                                    <option value="">Nhà xuất bản</option> </select>
                                
                                <select id="filterStatus" class="form-select bg-light border-0">
                                    <option value="">Tình trạng</option> <option value="available">Sẵn sàng</option>
                                    <option value="out_of_stock">Hết sách</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th class="ps-4 py-3">MÃ SÁCH</th>
                                    <th>TÊN SÁCH</th>
                                    <th>TÁC GIẢ</th>
                                    <th>THỂ LOẠI</th>
                                    <th>VỊ TRÍ</th>
                                    <th>HIỆN CÓ</th>
                                    <th>TÌNH TRẠNG</th>
                                    <th class="text-end pe-4">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body">
                                <tr>
                                    <td class="ps-4 fw-bold text-dark">B001</td>
                                    <td><div class="fw-bold">Đắc Nhân Tâm</div></td>
                                    <td>Dale Carnegie</td>
                                    <td><span class="badge rounded-pill bg-primary-subtle text-primary">Kỹ năng</span></td>
                                    <td>Kệ A1</td>
                                    <td class="fw-bold">42</td>
                                    <td>
                                        <span class="d-inline-block rounded-circle bg-success me-1" style="width: 8px; height: 8px;"></span>
                                        <span class="text-success fw-medium">Sẵn sàng</span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <button class="btn btn-sm btn-light text-primary me-1" title="Chỉnh sửa"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light text-danger" title="Xóa"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                                </tbody>
                        </table>
                    </div>

                    <div class="p-4 border-top d-flex justify-content-between align-items-center text-muted">
                        <small>Hiển thị <b class="text-dark">1</b> đến <b class="text-dark">10</b> trong tổng số <b class="text-dark">128</b> kết quả</small>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item disabled"><a class="page-link" href="#"><i class="fas fa-chevron-left"></i></a></li>
                            <li class="page-item active"><a class="page-link" href="#">1</a></li>
                            <li class="page-item"><a class="page-link" href="#">2</a></li>
                            <li class="page-item"><a class="page-link" href="#"><i class="fas fa-chevron-right"></i></a></li>
                        </ul>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../../../assets/js/ComponentLoader.js"></script>
    <script src="../../../../assets/js/ImageService.js"></script>
    <script src="/app/admin/views/inventory/BookView.js"></script>

    <script src="/app/admin/models/BookCopyModel.js"></script>
    <script src="/app/admin/controllers/BookCopyController.js"></script>
    <script src="/app/admin/models/BookModel.js"></script>
    <script src="/app/admin/models/AuthorModel.js"></script>
    <script src="/app/admin/models/PublisherModel.js"></script>
    <script src="/app/admin/models/CategoryModel.js"></script>
    <script src="/app/admin/models/ShelfModel.js"></script>
    <script src="/app/admin/controllers/BookController.js"></script>
    <div id="modal-container"></div>
    <div id="modal-copy-container"></div>
    <div id="modal-container-update"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Nạp Sidebar và Header đồng thời
            await Promise.all([
                ComponentLoader.load('sidebar-container', '../../components/sidebar.html'),
                ComponentLoader.load('header-container', '../../components/header.html')
            ]);
            await ComponentLoader.load('modal-copy-container', 'BookCopy.html');
            await ComponentLoader.load('modal-container', 'BookAdd.html');
            await ComponentLoader.load('modal-container-update', 'BookUpdate.html'); 
            setTimeout(() => {
                document.querySelectorAll('#sidebar-wrapper .list-group-item').forEach(el => el.classList.remove('active'));
                const loanMenu = document.querySelector('#sidebar-wrapper a[href="../inventory/inventory.html"]');
                if (loanMenu) loanMenu.classList.add('active');
                
                const pageTitle = document.getElementById('page-title');
                if(pageTitle) pageTitle.textContent = 'Quản lý kho sách';
            }, 100); 

            // 1. Tạo Model và View chung
            const bookModel = new BookModel();
            const bookView = new BookView();
            
            // 2. Tạo thằng Controller CHÍNH
            const bookCtrl = new BookController(bookModel, bookView, {
                author: new AuthorModel(),
                category: new CategoryModel(),
                publisher: new PublisherModel()
            });
            
            // 3. Tạo thằng Controller PHỤ (Quản lý bản sao)
            const copyModel = new BookCopyModel();
            const copyCtrl = new BookCopyController(copyModel, bookView, bookCtrl);

            // 4.  Gán thằng phụ vào một thuộc tính của thằng chính
            bookCtrl.copyController = copyCtrl; 

            // 5. Chạy
            bookCtrl.init();

            // if (typeof BookController !== 'undefined') {
            //     const bookController = new BookController(new BookModel(), new BookView());
            //     bookController.init();
            // }
        });
        
    </script>
</body>
</html>
