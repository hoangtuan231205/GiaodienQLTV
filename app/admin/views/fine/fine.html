<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tiền phạt - LMS Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../../../../assets/css/admin/admin-style.css"> 
    <link rel="stylesheet" href="../../../../assets/css/admin/fine-style.css"> 
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="flex-grow-1">
            <div id="header-container"></div>

            <div class="container-fluid px-4 py-4" id="main-content">
                
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h3 class="fw-bold mb-1" id="page-title">Quản lý tiền phạt</h3>
                        <p class="text-muted mb-0">Kiểm tra các khoản phạt vi phạm mượn trả của độc giả</p>
                    </div>
                    <div class="d-flex gap-3">
                        <button class="btn btn-danger shadow-sm fw-medium" data-bs-toggle="modal" data-bs-target="#createFineModal">
                            <i class="fas fa-plus me-2"></i>Tạo biên bản phạt
                        </button>
                    </div>
                </div>

                <div class="modal fade" id="createFineModal" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 shadow">
                            <div class="modal-header bg-light border-bottom-0 pb-3">
                                <h5 class="modal-title fw-bold text-danger">
                                    <i class="fas fa-exclamation-triangle me-2"></i>Tạo biên bản phạt
                                </h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body p-4">
                                <div class="alert alert-warning bg-opacity-10 border-0 small mb-4">
                                    <i class="fas fa-info-circle me-2"></i>Dành cho các trường hợp độc giả làm mất sách, làm rách hỏng tài liệu...
                                </div>
                                <form id="create-fine-form">
                                    <div class="mb-3">
                                        <label class="form-label fw-medium text-muted small">Mã Chi tiết mượn (Loan Detail ID)</label>
                                        <input type="number" class="form-control" id="fine-loan-detail-id" required placeholder="Ví dụ: 15">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-medium text-muted small">Số tiền phạt (VNĐ)</label>
                                        <input type="number" class="form-control" id="fine-amount" required min="0" step="1000" placeholder="Ví dụ: 50000">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-medium text-muted small">Lý do phạt</label>
                                        <textarea class="form-control" id="fine-reason" rows="3" required placeholder="Ví dụ: Khách làm rơi sách xuống nước rách 10 trang..."></textarea>
                                    </div>
                                </form>
                            </div>
                            <div class="modal-footer border-top-0 pt-0">
                                <button type="button" class="btn btn-white border text-secondary fw-medium" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" form="create-fine-form" class="btn btn-danger fw-medium px-4">Tạo biên bản</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    
                    <div class="p-4 border-bottom d-flex gap-3 flex-wrap align-items-center">
                        <div class="input-group search-input">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                            <input type="text" id="search-fine-input" class="form-control bg-light border-0" placeholder="Tìm theo mã phạt, mã phiếu mượn, độc giả...">
                        </div>
                        
                        <select class="form-select bg-light border-0 filter-select w-auto">
                            <option value="">Tất cả trạng thái</option>
                            <option value="unpaid">Chưa đóng phạt</option>
                            <option value="paid">Đã hoàn tất</option>
                        </select>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-custom align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4 py-3">MÃ PHẠT</th>
                                    <th class="py-3">MÃ PHIẾU LỖI</th>
                                    <th class="py-3" style="width: 20%;">ĐỘC GIẢ</th>
                                    <th class="py-3" style="width: 25%;">LÝ DO PHẠT</th>
                                    <th class="py-3">SỐ TIỀN (VNĐ)</th>
                                    <th class="py-3">TRẠNG THÁI</th>
                                    <th class="text-center pe-4 py-3">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody id="fine-table-body">
                                <tr>
                                    <td class="ps-4">Example</td>
                                    <td>LOI123</td>
                                    <td>Mẫu</td>
                                    <td>Quá hạn 5 ngày</td>
                                    <td>25,000</td>
                                    <td><span class="badge bg-danger">Chưa đóng phạt</span></td>
                                    <td class="text-center pe-4">
                                        <button class="btn btn-sm btn-success me-2"><i class="fas fa-check"></i> Đóng phạt</button>
                                        <button class="btn btn-sm btn-primary"><i class="fas fa-eye"></i> Xem chi tiết</button>
                                    </td>
                                </tr>
                                
                            </tbody>
                        </table>
                    </div>

                    <div class="p-4 border-top d-flex justify-content-between align-items-center"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../../../../assets/js/ComponentLoader.js"></script>
    <script src="../../../../assets/js/main.js"></script>

    <script src="/app/admin/models/FineModel.js"></script>
    <script src="/app/admin/views/fine/FineView.js"></script>
    <script src="/app/admin/controllers/FineController.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ComponentLoader.load('sidebar-container', '../../components/sidebar.html');
            ComponentLoader.load('header-container', '../../components/header.html');
            
            setTimeout(() => {
                document.querySelectorAll('#sidebar-wrapper .list-group-item').forEach(el => el.classList.remove('active'));
                const fineMenu = document.querySelector('#sidebar-wrapper a[href="../fine/fine.html"]'); 
                if (fineMenu) fineMenu.classList.add('active');
                
                const pageTitle = document.getElementById('page-title');
                if(pageTitle) pageTitle.textContent = 'Quản lý tiền phạt';
            }, 100); 

            // KHỞI TẠO CONTROLLER CHẠY NGHIỆP VỤ
            if (typeof FineController !== 'undefined') {
                const fineApp = new FineController(new FineModel(), new FineView());
                fineApp.init();
            }
        });
    </script>
</body>
</html>
