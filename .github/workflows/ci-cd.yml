name: Tự động hóa CI/CD Frontend Thư Viện

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  testing:
    name: Kiểm tra cú pháp Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn mới nhất
        uses: actions/checkout@v3

      - name: Kiểm tra cấu trúc file giao diện
        run: |
          if [ ! -f "index.html" ]; then
            echo "LỖI: Không tìm thấy file index.html gốc!"
            exit 1
          fi
          echo "Cấu trúc Frontend hợp lệ!"

      # BỔ SUNG BƯỚC NÀY: Tự động cài đặt nhanh Cypress và Serve mà không cần tệp lockfile
      - name: Cài đặt công cụ chạy Test
        run: npm install cypress serve

      - name: Chạy kiểm thử giao diện với Cypress
        uses: cypress-io/github-action@v6
        with:
          start: npx serve . -p 3000
          wait-on: "http://localhost:3000"
          cache-key: cypress-cache-${{ github.sha }}
          # Bật lại install để tránh lỗi hệ thống, nhưng vì ta đã cài ở bước trên nên nó sẽ chạy rất nhanh
          install: false

  deploy-to-render:
    name: Tự động đưa lên Render
    needs: testing
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Bắn tín hiệu Webhook cho Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
